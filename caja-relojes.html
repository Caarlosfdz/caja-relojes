<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caja · Relojes</title>
<style>
  :root{
    --bg:#0d1117;
    --soft:#151c26;
    --line:#222c3a;
    --line-soft:#1a232f;
    --text:#eaf0f7;
    --muted:#7d8da3;
    --green:#46d39a;
    --you:#6db8ff;
    --danger:#ef6e6e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;
    background:var(--bg);color:var(--text);
    min-height:100vh;padding:32px 18px 70px;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:540px;margin:0 auto}

  header{margin-bottom:30px}
  .kicker{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  h1{font-size:24px;font-weight:700;letter-spacing:-.01em}

  /* config inline, sin cajas pesadas */
  .config{
    display:flex;gap:26px;flex-wrap:wrap;
    padding:18px 0;margin:22px 0;
    border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);
  }
  .field{display:flex;flex-direction:column;gap:6px}
  .field span{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .field .inp{display:flex;align-items:baseline;gap:3px}
  .field input{
    width:74px;background:none;border:none;border-bottom:1px solid var(--line);
    color:var(--text);font-size:21px;font-weight:600;padding:2px 0;outline:none;font-family:inherit;
  }
  .field input:focus{border-color:var(--green)}
  .field em{color:var(--muted);font-size:15px;font-style:normal}
  .field small{color:var(--muted);font-size:11px}
  .field small b{color:var(--you);font-weight:600}

  /* add */
  .add{display:flex;gap:10px;margin-bottom:24px}
  .add input{
    flex:1;background:var(--soft);border:1px solid var(--line);
    color:var(--text);font-size:16px;padding:13px 15px;border-radius:11px;outline:none;font-family:inherit;
  }
  .add input::placeholder{color:var(--muted)}
  .add input:focus{border-color:var(--green)}
  .add button{
    border:none;background:var(--green);color:#06160e;font-weight:700;font-size:15px;
    padding:0 20px;border-radius:11px;cursor:pointer;font-family:inherit;transition:.15s;
  }
  .add button:hover{background:#5ee0aa}

  /* list */
  .list-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .list-head h2{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .list-head button{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;padding:4px}
  .list-head button:hover{color:var(--danger)}

  .sale{
    display:flex;align-items:center;gap:12px;
    padding:12px 2px;border-bottom:1px solid var(--line-soft);
  }
  .sale .n{color:var(--muted);font-size:12px;width:18px;flex:none;font-variant-numeric:tabular-nums}
  .sale .venta{font-size:16px;font-weight:600;width:74px;flex:none;font-variant-numeric:tabular-nums}
  .sale .split{flex:1;display:flex;gap:14px;font-size:13px;font-variant-numeric:tabular-nums}
  .sale .rein{color:var(--green)}
  .sale .you{color:var(--you)}
  .sale .full{color:var(--you);font-weight:600}
  .sale .x{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 4px;line-height:1;flex:none}
  .sale .x:hover{color:var(--danger)}
  .empty{color:var(--muted);font-size:14px;padding:22px 0;text-align:center}

  /* totals */
  .totals{display:flex;gap:30px;margin:26px 0 0;padding-top:22px;border-top:1px solid var(--line)}
  .tot{flex:1}
  .tot .k{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
  .tot .v{font-size:26px;font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .tot.rein .v{color:var(--green)}
  .tot.you .v{color:var(--you)}

  /* bucket */
  .bucket{margin-top:26px}
  .bucket .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
  .bucket .top .l{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .bucket .top .a{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
  .bucket .top .a b{color:var(--text);font-weight:600}
  .bar{height:8px;background:var(--soft);border-radius:20px;overflow:hidden}
  .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#1f9d6b,var(--green));border-radius:20px;transition:width .4s ease}
  .msg{margin-top:11px;font-size:13px;line-height:1.5}
  .msg.cover{color:var(--green)}
  .msg.wait{color:var(--muted)}
  .msg b{color:var(--you);font-weight:600}

  footer{margin-top:38px;text-align:center;color:#3c485a;font-size:11px;letter-spacing:.04em}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Carlos · caja</div>
    <h1>Reparto de ventas · relojes</h1>
  </header>

  <div class="config">
    <div class="field">
      <span>Coste / unidad</span>
      <div class="inp"><input id="coste" type="number" step="0.01" value="78.60"><em>€</em></div>
    </div>
    <div class="field">
      <span>Tu parte</span>
      <div class="inp"><input id="tuParte" type="number" min="0" max="100" value="30"><em>%</em></div>
      <small>Reinv. <span id="reinPct">70</span>% · tú <b id="youPct">30</b>%</small>
    </div>
    <div class="field">
      <span>Objetivo lote</span>
      <div class="inp"><input id="objetivo" type="number" step="10" value="850"><em>€</em></div>
    </div>
  </div>

  <div class="add">
    <input id="ventaInput" type="number" step="0.01" placeholder="Precio de venta cobrado…" inputmode="decimal">
    <button onclick="addVenta()">Añadir</button>
  </div>

  <div class="list-head">
    <h2>Ventas cobradas</h2>
    <button onclick="clearAll()">Vaciar</button>
  </div>
  <div id="salesList"></div>

  <div class="totals">
    <div class="tot rein">
      <div class="k">A reinversión</div>
      <div class="v" id="totalRein">0,00 €</div>
    </div>
    <div class="tot you">
      <div class="k">Para ti</div>
      <div class="v" id="totalYou">0,00 €</div>
    </div>
  </div>

  <div class="bucket">
    <div class="top">
      <span class="l">Cubo del próximo lote</span>
      <span class="a"><b id="bucketNow">0,00</b> / <span id="bucketGoal">850,00</span> €</span>
    </div>
    <div class="bar"><i id="bucketBar"></i></div>
    <div class="msg wait" id="bucketMsg">Sigue reinvirtiendo hasta cubrir el lote.</div>
  </div>

  <footer>Caja de relojes · uso personal</footer>
</div>

<script>
  let ventas = [];
  const fmt = n => n.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
  const $ = id => document.getElementById(id);

  function cfg(){
    let tu = Math.min(100,Math.max(0,parseFloat($('tuParte').value)||0));
    return {coste:parseFloat($('coste').value)||0, tu:tu/100, rein:(100-tu)/100, objetivo:parseFloat($('objetivo').value)||0};
  }
  function addVenta(){
    const v=parseFloat($('ventaInput').value);
    if(!v||v<=0){$('ventaInput').focus();return;}
    ventas.push(v);$('ventaInput').value='';$('ventaInput').focus();render();
  }
  $('ventaInput').addEventListener('keydown',e=>{if(e.key==='Enter')addVenta();});
  ['coste','tuParte','objetivo'].forEach(id=>$(id).addEventListener('input',render));
  function removeVenta(i){ventas.splice(i,1);render();}
  function clearAll(){if(ventas.length&&!confirm('¿Vaciar todas las ventas?'))return;ventas=[];render();}

  function render(){
    const c=cfg();
    $('reinPct').textContent=Math.round(c.rein*100);
    $('youPct').textContent=Math.round(c.tu*100);
    $('bucketGoal').textContent=c.objetivo.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2});

    let totalRein=0,totalYou=0,bucket=0,covered=false,coverIdx=-1;
    const rows=ventas.map((v,i)=>{
      const ben=v-c.coste; let rein,you,full=false;
      if(!covered){
        rein=c.coste+Math.max(0,ben)*c.rein;
        you=Math.max(0,ben)*c.tu;
        bucket+=rein;
        if(c.objetivo>0&&bucket>=c.objetivo){covered=true;coverIdx=i;}
      }else{rein=0;you=v;full=true;}
      totalRein+=rein;totalYou+=you;
      return {v,rein,you,full};
    });

    const list=$('salesList');
    if(!ventas.length){
      list.innerHTML='<div class="empty">Añade tu primera venta cobrada.</div>';
    }else{
      list.innerHTML=rows.map((r,i)=>`
        <div class="sale">
          <span class="n">${i+1}</span>
          <span class="venta">${fmt(r.v)}</span>
          <span class="split">${r.full
            ? `<span class="full">100% para ti · ${fmt(r.you)}</span>`
            : `<span class="rein">↻ ${fmt(r.rein)}</span><span class="you">tú ${fmt(r.you)}</span>`}</span>
          <button class="x" onclick="removeVenta(${i})">×</button>
        </div>`).join('');
    }

    $('totalRein').textContent=fmt(totalRein);
    $('totalYou').textContent=fmt(totalYou);

    const pct=c.objetivo>0?Math.min(100,bucket/c.objetivo*100):0;
    $('bucketNow').textContent=Math.min(bucket,c.objetivo).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2});
    $('bucketBar').style.width=pct+'%';

    const m=$('bucketMsg');
    if(c.objetivo<=0){m.className='msg wait';m.textContent='Pon un objetivo de lote para activar el aviso.';}
    else if(covered){m.className='msg cover';m.innerHTML=`✓ Lote cubierto en la venta #${coverIdx+1}. Desde ahí, <b>cada venta es 100% tuya</b>.`;}
    else{m.className='msg wait';m.innerHTML=`Faltan <b>${fmt(c.objetivo-bucket)}</b> para cubrir el lote y cobrar el 100%.`;}
  }
  render();
</script>
</body>
</html>
